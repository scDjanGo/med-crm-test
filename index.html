                <option value="past" ${f.period === 'past' ? 'selected' : ''}>Прошедшие</option>
              </select>
              <select class="select-input" onchange="state.appointmentsFilter.status=this.value;render()">
                <option value="all" ${f.status === 'all' ? 'selected' : ''}>Все статусы</option>
                ${Object.entries(STATUS).map(([k, s]) => `<option value="${k}" ${f.status === k ? 'selected' : ''}>${s.label}</option>`).join('')}
              </select>
              <select class="select-input" onchange="state.appointmentsFilter.staffId=this.value;render()">
                <option value="all" ${(f.staffId || 'all') === 'all' ? 'selected' : ''}>Все сотрудники</option>
                ${state.staff.filter(s => s.role === 'cosmetologist' || s.role === 'permanent').map(s => `<option value="${s.id}" ${f.staffId === s.id ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="appts-board-body">
      ${list.length === 0 ? `
        <div class="empty">
          <div class="empty-icon">${ICON.calendar}</div>
          <div class="empty-title">Записей нет</div>
          <div class="empty-text">Попробуйте изменить фильтры или создайте новую запись</div>
        </div>
      ` : `
      <div class="table-scroll">
        <table class="table table-appts">
          <thead>
            <tr>
              <th>Дата и время</th>
              <th>Клиент</th>
              <th>Исполнитель</th>
              <th>Услуги</th>
              <th class="num">Скидка</th>
              <th class="num">К оплате</th>
              <th class="num">Нал</th>
              <th class="num">Безнал</th>
              <th class="num">Остаток</th>
              <th>Статус</th>
              <th>Комментарий</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${list.map(a => {
              const c = getClient(a.clientId);
              const staffSummary = visitStaffSummary(a);
              const disc = visitDiscount(a);
              const due = visitDue(a);
              const cash = visitPaidCash(a);
              const card = visitPaidCard(a);
              const remaining = visitRemaining(a);
              const noteShort = (a.notes || '').slice(0, 10);
              return `
                <tr style="cursor:pointer" onclick="openAppointmentDetail('${a.id}')">
                  <td><div class="cell-datetime"><span class="cell-date">${fmt.dateShort(a.date)}</span><span class="cell-time">${a.time}</span></div></td>
                  <td>${escapeHtml(clientFullName(c) || '—')}</td>
                  <td class="muted">${staffSummary ? escapeHtml(staffSummary) : '—'}</td>
                  <td class="muted">${visitItemsSummary(a)}</td>
                  <td class="num ${disc ? '' : 'muted'}">${disc ? '−' + fmt.money(disc) : '—'}</td>
                  <td class="num"><b>${fmt.money(due)}</b></td>
                  <td class="num ${cash ? '' : 'muted'}">${cash ? fmt.money(cash) : '—'}</td>
                  <td class="num ${card ? '' : 'muted'}">${card ? fmt.money(card) : '—'}</td>
                  <td class="num"><span style="color:${remaining > 0 ? 'var(--danger)' : 'var(--success)'};font-weight:600">${fmt.money(remaining)}</span></td>
                  <td>${statusBadge(a.status)}</td>
                  <td class="muted note-cell" title="${escapeHtml(a.notes || '')}">${escapeHtml(noteShort) || '—'}${(a.notes || '').length > 10 ? '…' : ''}</td>
                  <td onclick="event.stopPropagation()">
                    <div class="table-actions">
                      <button class="btn btn-ghost btn-sm btn-icon" onclick="openModal('appointment', '${a.id}')" title="Редактировать">${ICON.edit}</button>
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
      `}
          </div>
        </div>
      </div>
      <div class="apps-side">
        ${renderCashPanel()}
        ${renderNotifyPanel()}
      </div>
    </div>
  `;
}

function openAppointmentDetail(id) {
  state.modal = { type: 'appointmentDetail', data: { id } };
  render();
}

// ========== VISIT BUILDER ==========
function resetNewVisit() {
  state.newVisit = {
    lookup: { lastName: '', firstName: '', birthDate: '' },
    newClientDraft: null,
    client: null,
    date: today(),
    time: '10:00',
    status: 'pending',
    notes: '',
    discount: 0,
    paidCash: 0,
    paidCard: 0,
    roomId: '',
    items: [],
    pickerStaffId: '',
  };
}

function lookupClientForVisit() {
  const v = state.newVisit;
  const ln = (v.lookup.lastName || '').trim();
  const fn = (v.lookup.firstName || '').trim();
  const bd = (v.lookup.birthDate || '').trim();
  if (!ln || !fn || !bd) { toast('Заполните Фамилия, Имя и Дату рождения', 'error'); return; }
  const found = findClientExact(ln, fn, bd);
  if (found) {
    v.client = found;
    v.newClientDraft = null;
    toast('Клиент найден: ' + clientFullName(found), 'success');
  } else {
    v.newClientDraft = { phone: '', email: '', tag: 'new' };
    toast('Клиент не найден — заполните карточку', '');
  }
  render();
}

function cancelNewClientDraft() {
  state.newVisit.newClientDraft = null;
  render();
}

function createClientFromDraft() {
  const v = state.newVisit;
  const d = v.newClientDraft;
  const ln = (v.lookup.lastName || '').trim();
  const fn = (v.lookup.firstName || '').trim();
  const bd = (v.lookup.birthDate || '').trim();
  if (!d.phone.trim()) { toast('Введите телефон', 'error'); return; }
  const c = {
    id: uid(),
    firstName: fn,
    lastName: ln,
    name: `${fn} ${ln}`.trim(),
    phone: d.phone.trim(),
    email: (d.email || '').trim(),
    birthDate: bd,
    tag: d.tag || 'new',
    notes: '',
    createdAt: today(),
  };
  state.clients.push(c);
  v.client = c;
  v.newClientDraft = null;
  save();
  toast('Клиент создан', 'success');
  render();
}

function clearVisitClient() {
  resetNewVisit();
  render();
}

function setVisitPicker(staffId) {
  state.newVisit.pickerStaffId = staffId;
  render();
}

function servicesForStaff(staffId) {
  const s = getStaff(staffId);
  if (!s) return [];
  if (s.role === 'permanent') return state.services.filter(sv => sv.cat === 'permanent');
  if (s.role === 'cosmetologist') return state.services.filter(sv => sv.cat !== 'permanent');
  return [];
}

function addVisitItem(serviceId) {
  const v = state.newVisit;
  if (!v.pickerStaffId) { toast('Сначала выберите исполнителя', 'error'); return; }
  const s = getService(serviceId);
  if (!s) return;
  v.items.push({ id: uid(), serviceId: s.id, staffId: v.pickerStaffId, price: s.price, duration: s.duration });
  render();
}

function removeVisitItem(itemId) {
  state.newVisit.items = state.newVisit.items.filter(i => i.id !== itemId);
  render();
}

function saveNewVisit() {
  const v = state.newVisit;
  if (!v.client) { toast('Выберите клиента', 'error'); return; }
  if (!v.items.length) { toast('Добавьте хотя бы одну услугу', 'error'); return; }
  if (!v.date || !v.time) { toast('Укажите дату и время', 'error'); return; }
  const paidCash = Math.max(0, Number(v.paidCash) || 0);
  const paidCard = Math.max(0, Number(v.paidCard) || 0);
  state.appointments.push({
    id: uid(),
    clientId: v.client.id,
    date: v.date,
    time: v.time,
    roomId: v.roomId || null,
    items: v.items.map(i => ({ ...i })),
    status: v.status || 'pending',
    discount: Math.max(0, Number(v.discount) || 0),
    paidCash,
    paidCard,
    prepayment: paidCash + paidCard,
    notes: v.notes || '',
  });
  resetNewVisit();
  save();
  toast('Запись создана', 'success');
  render();
}

function renderVisitBuilder() {
  const v = state.newVisit;
  // Stage A: no client yet — show lookup card.
  if (!v.client) {
    const lk = v.lookup;
    const draft = v.newClientDraft;
    return `
      <div class="visit-card visit-lookup">
        <div class="visit-lookup-head">
          <div class="visit-lookup-icon">${ICON.userCheck}</div>
          <div>
            <div class="visit-lookup-title">Записать клиента</div>
            <div class="visit-lookup-sub">Найдите клиента по Фамилии, Имени и дате рождения, или создайте новую карточку</div>
          </div>
        </div>
        <div class="lookup-row">
          <input type="text" class="form-input form-input-lg" id="vl-lastName" placeholder="Фамилия *" value="${escapeHtml(lk.lastName)}" oninput="state.newVisit.lookup.lastName=this.value">
          <input type="text" class="form-input form-input-lg" id="vl-firstName" placeholder="Имя *" value="${escapeHtml(lk.firstName)}" oninput="state.newVisit.lookup.firstName=this.value">
          <input type="date" class="form-input form-input-lg" id="vl-birthDate" value="${escapeHtml(lk.birthDate)}" oninput="state.newVisit.lookup.birthDate=this.value" title="Дата рождения">
          <button class="btn btn-primary btn-lg" onclick="lookupClientForVisit()">${ICON.search}<span>Записать</span></button>
        </div>
        ${draft ? `
          <div class="new-client-draft">
            <div class="muted" style="margin-bottom:8px">Клиент <b>${escapeHtml(lk.firstName)} ${escapeHtml(lk.lastName)}</b> (${escapeHtml(lk.birthDate)}) не найден. Заполните карточку:</div>
            <div class="lookup-row">
              <input type="tel" class="form-input" id="vc-phone" placeholder="Телефон *" value="${escapeHtml(draft.phone)}" oninput="state.newVisit.newClientDraft.phone=this.value">
              <input type="email" class="form-input" id="vc-email" placeholder="Email" value="${escapeHtml(draft.email)}" oninput="state.newVisit.newClientDraft.email=this.value">
              <select class="form-select" id="vc-tag" onchange="state.newVisit.newClientDraft.tag=this.value">
                <option value="new" ${draft.tag === 'new' ? 'selected' : ''}>Новый</option>
                <option value="regular" ${draft.tag === 'regular' ? 'selected' : ''}>Постоянный</option>
                <option value="vip" ${draft.tag === 'vip' ? 'selected' : ''}>VIP</option>
              </select>
              <button class="btn btn-primary" onclick="createClientFromDraft()">${ICON.check}<span>Создать и продолжить</span></button>
              <button class="btn btn-secondary" onclick="cancelNewClientDraft()">Отмена</button>
            </div>
          </div>
        ` : ''}
      </div>
    `;
  }

  // Stage B: client selected — show visit builder.
  const c = v.client;
  const eligibleStaff = state.staff.filter(s => s.active !== false && (s.role === 'cosmetologist' || s.role === 'permanent'));
  const pickerServices = v.pickerStaffId ? servicesForStaff(v.pickerStaffId) : [];
  const groupedPicker = {};
  pickerServices.forEach(s => {
    const k = getCatName(s.cat);
    if (!groupedPicker[k]) groupedPicker[k] = [];
    groupedPicker[k].push(s);
  });
  const total = v.items.reduce((sum, i) => sum + (Number(i.price) || 0), 0);
  const dur = v.items.reduce((sum, i) => sum + (Number(i.duration) || 0), 0);

  return `
    <div class="visit-card visit-current">
      <div class="visit-current-head">
        <div>
          <div class="visit-current-label">Текущий пациент</div>
          <div class="visit-current-name">${escapeHtml(clientFullName(c))} <span class="muted">· ${escapeHtml(c.birthDate || '')}${c.phone ? ' · ' + escapeHtml(c.phone) : ''}</span></div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="clearVisitClient()" title="Сбросить">${ICON.x}<span>Сбросить</span></button>
      </div>

      <div class="visit-grid">
        <div class="visit-left">
          <div class="visit-row-2">
            <div>
              <label class="form-label">Дата</label>
              <input type="date" class="form-input" id="vb-date" value="${v.date}" oninput="state.newVisit.date=this.value">
            </div>
            <div>
              <label class="form-label">Время</label>
              <input type="time" class="form-input" id="vb-time" value="${v.time}" oninput="state.newVisit.time=this.value">
            </div>
          </div>

          <label class="form-label">Услуги визита</label>
          ${v.items.length === 0 ? `
            <div class="visit-items-empty">Услуг пока нет — выберите исполнителя справа и добавьте услуги</div>
          ` : `
            <div class="visit-items">
              ${v.items.map(i => {
                const s = getService(i.serviceId);
                const st = getStaff(i.staffId);
                return `
                  <div class="visit-item">
                    <div class="visit-item-main">
                      <div class="visit-item-name">${escapeHtml(s?.name || '—')}</div>
                      <div class="visit-item-sub muted">${st ? escapeHtml(st.name) : '—'} · ${i.duration} мин</div>
                    </div>
                    <div class="visit-item-price">${fmt.money(i.price)}</div>
                    <button class="btn btn-ghost btn-sm btn-icon" onclick="removeVisitItem('${i.id}')" title="Удалить">${ICON.x}</button>
                  </div>
                `;
              }).join('')}
            </div>
          `}

          <div class="visit-row-2" style="margin-top:12px">
            <div>
              <label class="form-label">Статус</label>
              <select class="form-select" id="vb-status" onchange="state.newVisit.status=this.value">
                ${Object.entries(STATUS).map(([k, vv]) => `<option value="${k}" ${v.status === k ? 'selected' : ''}>${vv.label}</option>`).join('')}
              </select>
            </div>
            <div>
              <label class="form-label">Кабинет</label>
              <select class="form-select" id="vb-roomId" onchange="state.newVisit.roomId=this.value">
                <option value="">— Не выбран —</option>
                ${(state.rooms || []).filter(r => r.active !== false || r.id === v.roomId).map(r => `<option value="${r.id}" ${v.roomId === r.id ? 'selected' : ''}>${escapeHtml(r.name)}</option>`).join('')}
              </select>
            </div>
          </div>

          <div class="visit-row-2" style="margin-top:12px">
            <div>
              <label class="form-label">Длительность</label>
              <input type="text" class="form-input" value="${dur} мин" readonly>
            </div>
            <div>
              <label class="form-label">Скидка (с)</label>
              <input type="number" class="form-input" id="vb-discount" value="${Number(v.discount) || 0}" min="0" step="100" oninput="state.newVisit.discount=Number(this.value)||0;debouncedRender()">
            </div>
          </div>
          <div class="visit-row-2" style="margin-top:12px">
            <div>
              <label class="form-label">Оплачено наличными (с)</label>
              <input type="number" class="form-input" id="vb-paidCash" value="${Number(v.paidCash) || 0}" min="0" step="100" oninput="state.newVisit.paidCash=Number(this.value)||0;debouncedRender()">
            </div>
            <div>
              <label class="form-label">Оплачено безналом (с)</label>
              <input type="number" class="form-input" id="vb-paidCard" value="${Number(v.paidCard) || 0}" min="0" step="100" oninput="state.newVisit.paidCard=Number(this.value)||0;debouncedRender()">
            </div>
          </div>

          ${(() => {
            const disc = Math.max(0, Number(v.discount) || 0);
            const due = Math.max(0, total - disc);
            const paid = Math.max(0, Number(v.paidCash) || 0) + Math.max(0, Number(v.paidCard) || 0);
            const remaining = Math.max(0, due - paid);
            return `
              <div class="visit-totals" style="margin-top:12px">
                <div class="row"><span>Сумма услуг:</span><span>${fmt.money(total)}</span></div>
                ${disc ? `<div class="row muted"><span>Скидка:</span><span>−${fmt.money(disc)}</span></div>` : ''}
                <div class="row"><span>К оплате:</span><b>${fmt.money(due)}</b></div>
                ${paid ? `<div class="row muted"><span>Оплачено:</span><span>${fmt.money(paid)}</span></div>` : ''}
                <div class="row" style="border-top:1px solid var(--border);margin-top:4px;padding-top:6px"><span>Остаток:</span><b style="color:${remaining > 0 ? 'var(--danger)' : 'var(--success)'}">${fmt.money(remaining)}</b></div>
              </div>
            `;
          })()}

          <div class="form-row" style="margin-top:12px">
            <label class="form-label">Заметки</label>
            <textarea class="form-textarea" id="vb-notes" placeholder="Пожелания клиента, аллергии…" oninput="state.newVisit.notes=this.value">${escapeHtml(v.notes)}</textarea>
          </div>

          <div class="visit-footer">
            <button class="btn btn-primary" onclick="saveNewVisit()">${ICON.check}<span>Сохранить визит</span></button>
          </div>
        </div>

        <div class="visit-right">
          <label class="form-label">Исполнитель</label>
          <select class="form-select" id="vb-pickerStaff" onchange="setVisitPicker(this.value)">
            <option value="">— Выберите —</option>
            ${eligibleStaff.map(s => `<option value="${s.id}" ${v.pickerStaffId === s.id ? 'selected' : ''}>${escapeHtml(s.name)} · ${STAFF_ROLES[s.role] || s.role}</option>`).join('')}
          </select>

          ${!v.pickerStaffId ? `
            <div class="picker-empty muted">Выберите исполнителя, чтобы увидеть его услуги.</div>
          ` : pickerServices.length === 0 ? `
            <div class="picker-empty muted">У выбранного исполнителя нет доступных услуг.</div>
          ` : `
            <div class="picker-list">
              ${Object.entries(groupedPicker).map(([cat, items]) => `
                <div class="picker-group-title">${escapeHtml(cat)}</div>
                ${items.map(s => `
                  <button class="picker-service" onclick="addVisitItem('${s.id}')">
                    <span class="picker-service-name">${escapeHtml(s.name)}</span>
                    <span class="picker-service-meta muted">${fmt.money(s.price)} · ${s.duration} мин</span>
                    <span class="picker-service-add">${ICON.plus}</span>
                  </button>
                `).join('')}
              `).join('')}
            </div>
          `}
        </div>
      </div>
    </div>
  `;
}

</script>
<script>
// ========== CLIENTS ==========
function renderClientsSplit() {
  const nc = state.newClient;
  const inlineAdd = `
    <div class="inline-add inline-add-client">
      <input type="text" class="form-input" id="ic-lastName" placeholder="Фамилия *" value="${escapeHtml(nc.lastName || '')}" oninput="state.newClient.lastName=this.value">
      <input type="text" class="form-input" id="ic-firstName" placeholder="Имя *" value="${escapeHtml(nc.firstName || '')}" oninput="state.newClient.firstName=this.value">
      <input type="tel" class="form-input" id="ic-phone" placeholder="WhatsApp *" value="${escapeHtml(nc.phone || '')}" oninput="state.newClient.phone=this.value">
      <input type="date" class="form-input" id="ic-birthDate" value="${escapeHtml(nc.birthDate || '')}" oninput="state.newClient.birthDate=this.value" title="Дата рождения *">
      <button class="btn btn-primary" onclick="addClientInline()">${ICON.plus}<span>Добавить</span></button>
    </div>
  `;
  const detailContent = state.activeClientId ? `
    <button class="clients-detail-close" onclick="state.activeClientId=null;render()" title="Закрыть карточку">${ICON.x}</button>
    ${renderClientDetail()}
  ` : `
    <div class="clients-detail-empty">
      <div class="clients-detail-empty-icon">${ICON.users}</div>
      <div class="clients-detail-empty-title">Карточка клиента</div>
      <div class="clients-detail-empty-text">Выберите клиента из списка слева,<br>чтобы посмотреть детали и историю визитов.</div>
    </div>
  `;
  return `
    ${inlineAdd}
    <div class="clients-layout always-split">
      <div class="clients-list">${renderClients()}</div>
      <div class="clients-detail ${state.activeClientId ? '' : 'is-empty'}">
        ${detailContent}
      </div>
    </div>
  `;
}

function renderClients() {
  const f = state.clientsFilter;
  let list = [...state.clients];
  if (f.tag !== 'all') list = list.filter(c => c.tag === f.tag);
  if (f.search) {
    const q = f.search.toLowerCase();
    list = list.filter(c => c.name.toLowerCase().includes(q) || c.phone.includes(q));
  }
  list.sort((a, b) => a.name.localeCompare(b.name, 'ru'));

  return `
    <div class="appts-board">
      <div class="appts-board-head">
        <div class="filters">
          <div class="search-input">
            ${ICON.search}
            <input type="text" placeholder="Поиск по имени или телефону" value="${escapeHtml(f.search)}" oninput="state.clientsFilter.search=this.value;debouncedRender()">
          </div>
          <div class="tabs">
            <button class="tab ${f.tag === 'all' ? 'active' : ''}" onclick="state.clientsFilter.tag='all';render()">Все</button>
            <button class="tab ${f.tag === 'vip' ? 'active' : ''}" onclick="state.clientsFilter.tag='vip';render()">VIP</button>
            <button class="tab ${f.tag === 'regular' ? 'active' : ''}" onclick="state.clientsFilter.tag='regular';render()">Постоянные</button>
            <button class="tab ${f.tag === 'new' ? 'active' : ''}" onclick="state.clientsFilter.tag='new';render()">Новые</button>
          </div>
        </div>
      </div>
      <div class="appts-board-body">
        ${list.length === 0 ? `
          <div class="empty">
            <div class="empty-icon">${ICON.users}</div>
            <div class="empty-title">Клиентов не найдено</div>
            <div class="empty-text">Попробуйте изменить фильтры</div>
          </div>
        ` : `
        <div class="table-scroll">
          <table class="table">
            <thead>
              <tr>
                <th>Клиент</th>
                <th>Телефон</th>
                <th>Тип</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${list.map(c => {
                return `
                  <tr style="cursor:pointer" class="${state.activeClientId === c.id ? 'is-active' : ''}" onclick="state.activeClientId='${c.id}';render()">
                    <td>
                      <div style="display:flex;align-items:center;gap:10px">
                        <div class="user-avatar" style="background:#71717a">${clientInitials(c.name)}</div>
                        <div style="font-weight:500">${escapeHtml(clientFullName(c))}</div>
                      </div>
                    </td>
                    <td class="muted">${escapeHtml(c.phone)}</td>
                    <td>${tagBadge(c.tag)}</td>
                    <td onclick="event.stopPropagation()">
                      <div class="table-actions">
                        <button class="btn btn-ghost btn-sm btn-icon" onclick="openModal('client', '${c.id}')" title="Редактировать">${ICON.edit}</button>
                      </div>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
        `}
      </div>
    </div>
  `;
}

function addClientInline() {
  const d = state.newClient;
  const lastName = (d.lastName || '').trim();
  const firstName = (d.firstName || '').trim();
  const phone = (d.phone || '').trim();
  const birthDate = (d.birthDate || '').trim();
  if (!lastName) { toast('Введите фамилию', 'error'); return; }
  if (!firstName) { toast('Введите имя', 'error'); return; }
  if (!phone) { toast('Введите номер WhatsApp', 'error'); return; }
  if (!birthDate) { toast('Укажите дату рождения', 'error'); return; }
  state.clients.push({
    id: uid(),
    firstName,
    lastName,
    name: `${firstName} ${lastName}`,
    phone,
    email: '',
    birthDate,
    tag: 'new',
    notes: '',
    createdAt: today(),
  });
  state.newClient = { lastName: '', firstName: '', phone: '', birthDate: '' };
  save();
  toast('Клиент добавлен', 'success');
  render();
}

function renderClientEditForm(c) {
  const d = state.clientEditDraft;
  return `
    <div class="client-detail-head">
      <div class="user-avatar" style="width:44px;height:44px;font-size:15px">${clientInitials(c.name)}</div>
      <div class="client-detail-head-main">
        <div class="client-detail-name">Редактирование карточки</div>
        <div class="client-detail-sub muted">${escapeHtml(clientFullName(c))}</div>
      </div>
      <div class="client-detail-actions">
        <button class="btn btn-secondary btn-sm" onclick="cancelClientEdit()">${ICON.x}<span class="btn-label-mobile-hide">Отмена</span></button>
        <button class="btn btn-primary btn-sm" onclick="saveClientEdit()">${ICON.check}<span class="btn-label-mobile-hide">Сохранить</span></button>
      </div>
    </div>

    <div class="form-section">Личное</div>
    <div class="form-row form-row-2">
      <div>
        <label class="form-label">Фамилия *</label>
        <input type="text" class="form-input" id="cef-lastName" value="${escapeHtml(d.lastName || '')}" oninput="state.clientEditDraft.lastName=this.value">
      </div>
      <div>
        <label class="form-label">Имя *</label>
        <input type="text" class="form-input" id="cef-firstName" value="${escapeHtml(d.firstName || '')}" oninput="state.clientEditDraft.firstName=this.value">
      </div>
    </div>
    <div class="form-row form-row-2">
      <div>
        <label class="form-label">Дата рождения *</label>
        <input type="date" class="form-input" id="cef-birthDate" value="${escapeHtml(d.birthDate || '')}" oninput="state.clientEditDraft.birthDate=this.value">
      </div>
      <div>
        <label class="form-label">Тип клиента</label>
        <select class="form-select" id="cef-tag" onchange="state.clientEditDraft.tag=this.value">
          <option value="new" ${(d.tag || 'new') === 'new' ? 'selected' : ''}>Новый</option>
          <option value="regular" ${d.tag === 'regular' ? 'selected' : ''}>Постоянный</option>
          <option value="vip" ${d.tag === 'vip' ? 'selected' : ''}>VIP</option>
        </select>
      </div>
    </div>

    <div class="form-section">Контакты</div>
    <div class="form-row form-row-2">
      <div>
        <label class="form-label">Телефон / WhatsApp *</label>
        <input type="tel" class="form-input" id="cef-phone" value="${escapeHtml(d.phone || '')}" oninput="state.clientEditDraft.phone=this.value">
      </div>
      <div>
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="cef-email" value="${escapeHtml(d.email || '')}" oninput="state.clientEditDraft.email=this.value">
      </div>
    </div>

    <div class="form-section">Медицинские заметки</div>
    <div class="form-row">
      <textarea class="form-textarea" id="cef-notes" rows="4" placeholder="Аллергии, противопоказания, особенности — будет видно перед каждой процедурой" oninput="state.clientEditDraft.notes=this.value">${escapeHtml(d.notes || '')}</textarea>
    </div>

    <div class="client-edit-footer">
      <button class="btn btn-danger btn-sm" onclick="deleteFromModal('client','${c.id}')">${ICON.trash}<span>Удалить клиента</span></button>
      <div style="flex:1"></div>
      <button class="btn btn-secondary btn-sm" onclick="cancelClientEdit()">Отмена</button>
      <button class="btn btn-primary btn-sm" onclick="saveClientEdit()">${ICON.check}<span>Сохранить</span></button>
    </div>
  `;
}

function startClientEdit(focus) {
  const c = getClient(state.activeClientId);
  if (!c) return;
  state.clientEditDraft = { ...c, _focus: focus || null };
  render();
  if (focus) {
    const el = document.getElementById('cef-' + focus);
    if (el) { el.focus(); el.scrollIntoView({ block: 'center', behavior: 'smooth' }); }
  }
}
function cancelClientEdit() {
  state.clientEditDraft = null;
  render();
}
function saveClientEdit() {
  const d = state.clientEditDraft;
  if (!d) return;
  const ln = (d.lastName || '').trim();
  const fn = (d.firstName || '').trim();
  const ph = (d.phone || '').trim();
  const bd = (d.birthDate || '').trim();
  if (!ln) { toast('Введите фамилию', 'error'); return; }
  if (!fn) { toast('Введите имя', 'error'); return; }
  if (!ph) { toast('Введите номер WhatsApp', 'error'); return; }
  if (!bd) { toast('Укажите дату рождения', 'error'); return; }
  const c = getClient(state.activeClientId);
  if (!c) return;
  Object.assign(c, {
    lastName: ln,
    firstName: fn,
    name: `${fn} ${ln}`,
    phone: ph,
    email: (d.email || '').trim(),
    birthDate: bd,
    tag: d.tag || c.tag || 'new',
    notes: d.notes || '',
  });
  state.clientEditDraft = null;
  save();
  toast('Клиент обновлён', 'success');
  render();
}

function renderClientDetail() {
  const c = getClient(state.activeClientId);
  if (!c) { state.activeClientId = null; return renderClients(); }
  if (state.clientEditDraft && state.clientEditDraft.id === c.id) return renderClientEditForm(c);
  const visits = state.appointments.filter(a => a.clientId === c.id).sort((a, b) => (b.date + b.time).localeCompare(a.date + a.time));

  // Stats
  const total = visits.length;
  const byStatus = { pending: 0, confirmed: 0, arrived: 0, completed: 0, no_show: 0, cancelled: 0 };
  let totalRevenue = 0, totalDue = 0, totalPaid = 0, totalRemaining = 0;
  visits.forEach(a => {
    byStatus[a.status] = (byStatus[a.status] || 0) + 1;
    if (a.status === 'completed') totalRevenue += visitDue(a);
    if (a.status !== 'cancelled' && a.status !== 'no_show') {
      totalDue += visitDue(a);
      totalPaid += visitPaid(a);
      totalRemaining += visitRemaining(a);
    }
  });
  const lastVisit = visits[0];
  const lastVisitDate = lastVisit ? fmt.date(lastVisit.date) : '—';

  // Age from birthDate
  let age = '';
  if (c.birthDate) {
    const bd = new Date(c.birthDate);
    const ageMs = Date.now() - bd.getTime();
    const ageYears = Math.floor(ageMs / (1000 * 60 * 60 * 24 * 365.25));
    if (ageYears > 0 && ageYears < 130) age = ` · ${ageYears} ${ageYears % 10 === 1 && ageYears % 100 !== 11 ? 'год' : (ageYears % 10 >= 2 && ageYears % 10 <= 4 && (ageYears % 100 < 10 || ageYears % 100 >= 20) ? 'года' : 'лет')}`;
  }

  return `
    <div class="client-detail-head">
      <div class="user-avatar" style="width:44px;height:44px;font-size:15px">${clientInitials(c.name)}</div>
      <div class="client-detail-head-main">
        <div class="client-detail-name">${escapeHtml(clientFullName(c))} ${tagBadge(c.tag)}</div>
        <div class="client-detail-sub muted">${escapeHtml(c.phone || '')}${c.email ? ' · ' + escapeHtml(c.email) : ''}</div>
      </div>
      <div class="client-detail-actions">
        <button class="btn btn-secondary btn-sm" onclick="startClientEdit()">${ICON.edit}<span class="btn-label-mobile-hide">Редактировать</span></button>
        <button class="btn btn-primary btn-sm" onclick="openModal('appointment', null, {clientId:'${c.id}'})">${ICON.plus}<span class="btn-label-mobile-hide">Запись</span></button>
      </div>
    </div>

    <div class="medical-notes ${c.notes ? '' : 'is-empty'}" onclick="startClientEdit('notes')">
      <div class="medical-notes-icon">${ICON.info}</div>
      <div class="medical-notes-body">
        <div class="medical-notes-title">${c.notes ? '⚠️ Внимание перед процедурой' : 'Медицинские заметки'}</div>
        ${c.notes
          ? `<div class="medical-notes-text">${escapeHtml(c.notes)}</div>`
          : `<div class="medical-notes-placeholder">Нажмите, чтобы добавить аллергии, противопоказания или особенности — будет видно перед каждой процедурой.</div>`}
      </div>
      <span class="medical-notes-edit">${ICON.edit}</span>
    </div>

    <div class="form-section">Личное</div>
    <div class="info-list">
      <div class="info-row"><span class="info-label">Фамилия</span><span class="info-value">${escapeHtml(c.lastName || '—')}</span></div>
      <div class="info-row"><span class="info-label">Имя</span><span class="info-value">${escapeHtml(c.firstName || '—')}</span></div>
      <div class="info-row"><span class="info-label">День рождения</span><span class="info-value">${c.birthDate ? fmt.date(c.birthDate) + age : '—'}</span></div>
      <div class="info-row"><span class="info-label">Тип клиента</span><span class="info-value">${tagBadge(c.tag)}</span></div>
    </div>

    <div class="form-section">Контакты</div>
    <div class="info-list">
      <div class="info-row"><span class="info-label">Телефон / WhatsApp</span><span class="info-value">${escapeHtml(c.phone || '—')}</span></div>
      <div class="info-row"><span class="info-label">Email</span><span class="info-value">${escapeHtml(c.email || '—')}</span></div>
    </div>

    <div class="form-section">Сводка</div>
    <div class="client-stats stats-3">
      <div class="client-stat">
        <div class="client-stat-label">Всего визитов</div>
        <div class="client-stat-value">${total}</div>
        ${total ? `<div class="client-stat-sub muted">
          ${byStatus.completed ? `<span class="badge badge-success">${byStatus.completed} заверш.</span>` : ''}
          ${(byStatus.pending + byStatus.confirmed) ? `<span class="badge badge-info">${byStatus.pending + byStatus.confirmed} запл.</span>` : ''}
          ${byStatus.no_show ? `<span class="badge badge-muted">${byStatus.no_show} не пришёл</span>` : ''}
          ${byStatus.cancelled ? `<span class="badge badge-danger">${byStatus.cancelled} отм.</span>` : ''}
        </div>` : ''}
      </div>
      <div class="client-stat">
        <div class="client-stat-label">Долг</div>
        <div class="client-stat-value" style="color:${totalRemaining > 0 ? 'var(--danger)' : 'var(--success)'}">${fmt.money(totalRemaining)}</div>
        <div class="client-stat-sub muted">по активным визитам</div>
      </div>
      <div class="client-stat">
        <div class="client-stat-label">Последний визит</div>
        <div class="client-stat-value" style="font-size:14px">${lastVisitDate}</div>
        <div class="client-stat-sub muted">${lastVisit ? lastVisit.time : '—'}</div>
      </div>
    </div>

    <div class="form-section">Системное</div>
    <div class="info-list">
      <div class="info-row"><span class="info-label">Клиент с</span><span class="info-value">${c.createdAt ? fmt.date(c.createdAt) : '—'}</span></div>
      <div class="info-row"><span class="info-label">ID</span><span class="info-value" style="font-family:monospace;font-size:11px">${escapeHtml(c.id)}</span></div>
    </div>

    <div class="form-section">История визитов <span class="muted" style="font-weight:400">· ${total}</span></div>
    <div class="card">
      ${visits.length === 0 ? `
        <div class="card-empty">У клиента пока нет записей</div>
      ` : `
        <div class="table-scroll">
          <table class="table">
            <thead>
              <tr>
                <th>Дата</th>
                <th>Услуги</th>
                <th class="num">Сумма</th>
                <th>Статус</th>
              </tr>
            </thead>
            <tbody>
              ${visits.map(a => {
                return `
                  <tr style="cursor:pointer" onclick="openAppointmentDetail('${a.id}')">
                    <td>${fmt.dateShort(a.date)} ${a.time}</td>
                    <td class="muted">${visitItemsSummary(a)}</td>
                    <td class="num">${fmt.money(visitTotal(a))}</td>
                    <td>${statusBadge(a.status)}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `}
    </div>
  `;
}

</script>
<script>
// ========== SERVICES ==========
function renderServices() {
  const tab = state.servicesTab || 'list';
  const tabsHtml = `
    <div class="settings-tabs">
      <button class="settings-tab ${tab === 'list' ? 'active' : ''}" onclick="state.servicesTab='list';render()">Услуги</button>
      <button class="settings-tab ${tab === 'categories' ? 'active' : ''}" onclick="state.servicesTab='categories';render()">Категории</button>
    </div>
  `;
  if (tab === 'categories') return tabsHtml + renderServiceCategories();

  const f = state.servicesFilter;
  let list = [...state.services];
  if (f.cat !== 'all') list = list.filter(s => s.cat === f.cat);
  if (f.search) {
    const q = f.search.toLowerCase();
    list = list.filter(s => s.name.toLowerCase().includes(q));
  }
  list.sort((a, b) => a.name.localeCompare(b.name, 'ru'));

  const cats = [['all', 'Все'], ...(state.serviceCategories || []).map(c => [c.id, c.name])];

  return tabsHtml + `
    <div class="appts-board">
      <div class="appts-board-head">
        <div class="filters">
          <div class="search-input">
            ${ICON.search}
            <input type="text" placeholder="Поиск услуги" value="${escapeHtml(f.search)}" oninput="state.servicesFilter.search=this.value;debouncedRender()">
          </div>
          <select class="select-input" onchange="state.servicesFilter.cat=this.value;render()">
            ${cats.map(([k, v]) => `<option value="${k}" ${f.cat === k ? 'selected' : ''}>${v}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="appts-board-body">
        ${list.length === 0 ? `
          <div class="empty">
            <div class="empty-icon">${ICON.scissors}</div>
            <div class="empty-title">Услуг не найдено</div>
          </div>
        ` : `
          <div class="table-scroll">
            <table class="table">
              <thead>
                <tr>
                  <th>Услуга</th>
                  <th>Категория</th>
                  <th>Длительность</th>
                  <th class="num">Цена</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${list.map(s => `
                  <tr>
                    <td><div style="font-weight:500">${escapeHtml(s.name)}</div></td>
                    <td><span class="badge">${escapeHtml(getCatName(s.cat))}</span></td>
                    <td class="muted">${s.duration} мин</td>
                    <td class="num"><b>${fmt.money(s.price)}</b></td>
                    <td>
                      <div class="table-actions">
                        <button class="btn btn-ghost btn-sm btn-icon" onclick="openModal('service', '${s.id}')" title="Редактировать">${ICON.edit}</button>
                        <button class="btn btn-ghost btn-sm btn-icon" onclick="deleteService('${s.id}')" title="Удалить">${ICON.trash}</button>
                      </div>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `}
      </div>
    </div>
  `;
}

function renderServiceCategories() {
  const cats = state.serviceCategories || [];
  const nc = state.newCategory || { name: '' };
  const counts = {};
  state.services.forEach(s => { counts[s.cat] = (counts[s.cat] || 0) + 1; });
  return `
    <div class="appts-board">
      <div class="appts-board-head">
        <div class="filters">
          <input type="text" class="form-input" id="ncat-name" placeholder="Название новой категории" style="flex:1 1 220px;min-width:180px" value="${escapeHtml(nc.name || '')}" oninput="state.newCategory.name=this.value" onkeydown="if(event.key==='Enter'){addServiceCategory()}">
          <button class="btn btn-primary" onclick="addServiceCategory()">${ICON.plus}<span>Добавить категорию</span></button>
        </div>
      </div>
      <div class="appts-board-body">
        ${cats.length === 0 ? `
          <div class="empty"><div class="empty-icon">${ICON.scissors}</div><div class="empty-title">Категорий нет</div></div>
        ` : `
          <div class="table-scroll">
            <table class="table">
              <thead>
                <tr>
                  <th>Название</th>
                  <th class="num">Услуг</th>
                  <th>ID</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                ${cats.map(c => {
                  const used = counts[c.id] || 0;
                  return `
                    <tr>
                      <td><input type="text" class="form-input" style="height:32px;font-size:13px" value="${escapeHtml(c.name)}" oninput="updateServiceCategoryName('${c.id}', this.value)"></td>
                      <td class="num muted">${used}</td>
                      <td class="muted" style="font-family:monospace;font-size:11px">${escapeHtml(c.id)}</td>
                      <td style="text-align:right">
                        <button class="btn btn-ghost btn-sm btn-icon" onclick="deleteServiceCategory('${c.id}')" title="Удалить">${ICON.trash}</button>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `}
      </div>
    </div>
  `;
}

function addServiceCategory() {
  const name = (state.newCategory?.name || '').trim();
  if (!name) { toast('Введите название', 'error'); return; }
  state.serviceCategories = state.serviceCategories || [];
  // Generate id from latin slug + uid suffix to keep readable
  const slug = name.toLowerCase().replace(/[^a-zа-я0-9]+/gi, '_').replace(/^_+|_+$/g, '').slice(0, 12) || 'cat';
  const id = slug + '_' + uid().slice(0, 4);
  state.serviceCategories.push({ id, name });
  state.newCategory = { name: '' };
  save();
  toast('Категория добавлена', 'success');
  render();
}

function updateServiceCategoryName(id, name) {
  const c = state.serviceCategories?.find(c => c.id === id);
  if (!c) return;
  c.name = name;
  save();
  // No render — input keeps focus naturally
}

function deleteServiceCategory(id) {
  const c = state.serviceCategories?.find(c => c.id === id);
  if (!c) return;
  const used = state.services.filter(s => s.cat === id).length;
  let confirmMsg = `Удалить категорию «${c.name}»?`;
  if (used > 0) {
    // Ensure 'other' exists as a fallback target
    if (!state.serviceCategories.find(x => x.id === 'other')) {
      state.serviceCategories.push({ id: 'other', name: 'Другое' });
    }
    confirmMsg += `\n\nК ней привязано услуг: ${used}. Они будут переведены в «Другое».`;
  }
  if (!confirm(confirmMsg)) return;
  if (used > 0) {
    state.services.forEach(s => { if (s.cat === id) s.cat = 'other'; });
  }
  state.serviceCategories = state.serviceCategories.filter(x => x.id !== id);
  save();
  toast('Категория удалена', 'success');
  render();
}

function deleteService(id) {
  const s = getService(id);
  if (!s) return;
  if (!confirm(`Удалить услугу «${s.name}»?`)) return;
  state.services = state.services.filter(x => x.id !== id);
  save();
  toast('Услуга удалена', 'success');
  render();
}

// ========== PRODUCTS ==========
function renderProducts() {
  const f = state.productsFilter;
  const all = state.products;
  // KPI summary across ALL products (not just filtered)
  const totalCount = all.length;
  const totalValue = all.reduce((s, p) => s + (Number(p.price) || 0) * (Number(p.stock) || 0), 0);
  const lowCount = all.filter(p => p.stock > 0 && p.stock <= p.minStock).length;
  const outCount = all.filter(p => p.stock === 0).length;

  let list = [...all];
  if (f.cat !== 'all') list = list.filter(p => p.cat === f.cat);
  if (f.lowOnly) list = list.filter(p => p.stock <= p.minStock);
  if (f.search) {
    const q = f.search.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(q) || (p.supplier || '').toLowerCase().includes(q));
  }
  // Default sort: critical stock first, then by name
  list.sort((a, b) => {
    const aCrit = a.stock === 0 ? 0 : a.stock <= a.minStock ? 1 : 2;
    const bCrit = b.stock === 0 ? 0 : b.stock <= b.minStock ? 1 : 2;
    if (aCrit !== bCrit) return aCrit - bCrit;
    return a.name.localeCompare(b.name, 'ru');
  });

  const cats = [['all', 'Все категории'], ...Object.entries(PRODUCT_CATS)];

  return `
    <div class="daily-summary">
      <div class="ds-block">
        <div class="ds-label">Всего товаров</div>
        <div class="ds-value">${totalCount}</div>
      </div>
      <div class="ds-block">
        <div class="ds-label">Стоимость склада</div>
        <div class="ds-value">${fmt.money(totalValue)}</div>
      </div>
      <div class="ds-block">
        <div class="ds-label">Заканчиваются</div>
        <div class="ds-value" style="color:${lowCount > 0 ? 'var(--warning)' : 'var(--text)'}">${lowCount}</div>
      </div>
      <div class="ds-block">
        <div class="ds-label">Нет в наличии</div>
        <div class="ds-value" style="color:${outCount > 0 ? 'var(--danger)' : 'var(--text)'}">${outCount}</div>
      </div>
    </div>

    <div class="appts-board">
      <div class="appts-board-head">
        <div class="filters">
          <div class="search-input">
            ${ICON.search}
            <input type="text" placeholder="Поиск по названию или поставщику" value="${escapeHtml(f.search)}" oninput="state.productsFilter.search=this.value;debouncedRender()">
          </div>
          <select class="select-input" onchange="state.productsFilter.cat=this.value;render()">
            ${cats.map(([k, v]) => `<option value="${k}" ${f.cat === k ? 'selected' : ''}>${v}</option>`).join('')}
          </select>
          <button class="btn ${f.lowOnly ? 'btn-primary' : 'btn-secondary'} btn-sm" onclick="state.productsFilter.lowOnly=!state.productsFilter.lowOnly;render()">
            ${ICON.info}<span>Только заканчивающиеся</span>
          </button>
        </div>
      </div>
      <div class="appts-board-body">
        ${list.length === 0 ? `
          <div class="empty">
            <div class="empty-icon">${ICON.box}</div>
            <div class="empty-title">Товаров не найдено</div>
            <div class="empty-text">Попробуйте изменить фильтры или добавить новый товар</div>
          </div>
        ` : `
          <div class="table-scroll">
            <table class="table table-products">
              <thead>
                <tr>
                  <th></th>
                  <th>Товар</th>
                  <th>Категория</th>
                  <th>Поставщик</th>
                  <th class="num">Остаток</th>
                  <th class="num">Мин</th>
                  <th class="num">Цена</th>
                  <th class="num">Стоимость</th>
                </tr>
              </thead>
              <tbody>
                ${list.map(p => {
                  const stock = Number(p.stock) || 0;
                  const minStock = Number(p.minStock) || 0;
                  const status = stock === 0 ? { tone: 'danger', label: 'Нет' }
                    : stock <= minStock ? { tone: 'warning', label: 'Мало' }
                    : { tone: 'success', label: 'OK' };
                  return `
                    <tr class="tone-${status.tone}" style="cursor:pointer" onclick="openProductDetail('${p.id}')">
                      <td><span class="product-status-dot" title="${status.label}"></span></td>
                      <td><b>${escapeHtml(p.name)}</b></td>
                      <td class="muted">${escapeHtml(PRODUCT_CATS[p.cat] || p.cat)}</td>
                      <td class="muted">${escapeHtml(p.supplier || '—')}</td>
                      <td class="num" onclick="event.stopPropagation()">
                        <div class="qty-stepper" title="Кликните по числу для ввода вручную; Shift+клик для ±5">
                          <button type="button" class="minus" ${stock <= 0 ? 'disabled' : ''} onclick="adjustStockSmart('${p.id}', -1, event)" title="Списать">−</button>
                          <button type="button" class="qty-num" onclick="setStockPrompt('${p.id}')" title="Изменить вручную">${stock}<span class="qty-unit">${escapeHtml(p.unit || '')}</span></button>
                          <button type="button" class="plus" onclick="adjustStockSmart('${p.id}', 1, event)" title="Принять">+</button>
                        </div>
                      </td>
                      <td class="num muted">${minStock}</td>
                      <td class="num">${fmt.money(p.price)}</td>
                      <td class="num muted">${fmt.money(stock * (Number(p.price) || 0))}</td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `}
      </div>
    </div>
  `;
}

function openProductDetail(id) {
  state.modal = { type: 'productDetail', data: { id } };
  render();
}

</script>
<script>
// ========== STAFF ==========
function renderStaff() {
  const f = state.staffFilter;
  let list = [...state.staff];
  if (f.role !== 'all') list = list.filter(s => s.role === f.role);
  if (f.search) {
    const q = f.search.toLowerCase();
    list = list.filter(s => s.name.toLowerCase().includes(q) || (s.specialty || '').toLowerCase().includes(q) || (s.phone || '').includes(q));
  }
  list.sort((a, b) => a.name.localeCompare(b.name, 'ru'));

  const roles = [['all', 'Все должности'], ...Object.entries(STAFF_ROLES)];
  const performers = list.filter(s => s.role === 'cosmetologist' || s.role === 'permanent');
  const others = list.filter(s => s.role !== 'cosmetologist' && s.role !== 'permanent');
  const todayStr = today();
  const nowMin = (() => {
    const d = new Date();
    return d.getHours() * 60 + d.getMinutes();
  })();

  return `
    ${renderDailySummary()}

    <div class="appts-board">
      <div class="appts-board-head">
        <div class="filters">
          <div class="search-input">
            ${ICON.search}
            <input type="text" placeholder="Поиск по имени или специализации" value="${escapeHtml(f.search)}" oninput="state.staffFilter.search=this.value;debouncedRender()">
          </div>
          <select class="select-input" onchange="state.staffFilter.role=this.value;render()">
            ${roles.map(([k, v]) => `<option value="${k}" ${f.role === k ? 'selected' : ''}>${v}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="appts-board-body" style="padding:16px">
        ${list.length === 0 ? `
          <div class="empty">
            <div class="empty-icon">${ICON.userCheck}</div>
            <div class="empty-title">Сотрудников не найдено</div>
            <div class="empty-text">Попробуйте изменить фильтры</div>
          </div>
        ` : `
          ${performers.length ? `
            <div class="section-title" style="margin-top:0">Исполнители <span class="muted">· загрузка на сегодня</span></div>
            <div class="staff-grid">
              ${performers.map(s => renderPerformerCard(s, todayStr, nowMin)).join('')}
            </div>
          ` : ''}
          ${others.length ? `
            <div class="section-title" style="margin-top:18px">Прочий персонал</div>
            <div class="staff-grid">
              ${others.map(s => `
                <div class="staff-card" onclick="openModal('staff','${s.id}')">
                  <div class="staff-head">
                    <div class="user-avatar" style="background:#71717a;width:36px;height:36px;font-size:13px">${clientInitials(s.name)}</div>
                    <div class="staff-head-main">
                      <div class="staff-name">${escapeHtml(s.name)}</div>
                      <div class="staff-role">${STAFF_ROLES[s.role] || s.role}</div>
                    </div>
                    ${s.active === false ? '<span class="badge badge-danger">Не работает</span>' : ''}
                  </div>
                  ${s.specialty ? `<div class="staff-specialty">${escapeHtml(s.specialty)}</div>` : ''}
                  <div class="staff-foot">
                    ${s.phone ? `<div>${escapeHtml(s.phone)}</div>` : ''}
                    ${s.schedule ? `<div class="muted">${escapeHtml(s.schedule)}</div>` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          ` : ''}
        `}
      </div>
    </div>
  `;
}

function renderPerformerCard(s, todayStr, nowMin) {
  // Today's appointments where this staff has any item
  const visits = state.appointments
    .filter(a => a.date === todayStr && (a.items || []).some(i => i.staffId === s.id))
    .sort((a, b) => a.time.localeCompare(b.time));
  // Sum revenue + minutes for items belonging to this staff
  let count = 0, mins = 0, money = 0;
  let currentVisit = null, nextVisit = null;
  visits.forEach(a => {
    const myItems = (a.items || []).filter(i => i.staffId === s.id);
    count += myItems.length;
    myItems.forEach(i => { mins += Number(i.duration) || 0; money += Number(i.price) || 0; });
    const start = timeToMinutes(a.time);
    const end = start + (visitDuration(a) || 30);
    if (start <= nowMin && nowMin < end) currentVisit = a;
    else if (start > nowMin && (!nextVisit || start < timeToMinutes(nextVisit.time))) nextVisit = a;
  });
  let statusBadgeHtml, tone;
  if (s.active === false) { statusBadgeHtml = '<span class="badge badge-danger">Выходной</span>'; tone = 'danger'; }
  else if (currentVisit)  { statusBadgeHtml = '<span class="badge badge-info">Сейчас работает</span>'; tone = 'info'; }
  else if (visits.length) { statusBadgeHtml = '<span class="badge badge-success">На смене</span>'; tone = 'success'; }
  else                    { statusBadgeHtml = '<span class="badge">Нет записей</span>'; tone = 'muted'; }

  // Compact schedule timeline: list visit chips
  const chipsHtml = visits.length ? visits.map(a => {
    const room = getRoom(a.roomId);
    const c = getClient(a.clientId);
    const isCurrent = a === currentVisit;
    return `
      <button class="staff-chip ${isCurrent ? 'is-current' : ''} s-${a.status}" onclick="event.stopPropagation();openAppointmentDetail('${a.id}')">
        <span class="staff-chip-time">${a.time}</span>
        <span class="staff-chip-name">${escapeHtml((clientFullName(c) || '?').split(' ')[0])}</span>
        ${room ? `<span class="staff-chip-room">${escapeHtml(room.name)}</span>` : ''}
      </button>
    `;
  }).join('') : '<div class="muted" style="font-size:12px;padding:4px 0">Записей на сегодня нет</div>';

  return `
    <div class="staff-card performer tone-${tone}" onclick="openModal('staff','${s.id}')">
      <div class="staff-head">
        <div class="user-avatar" style="background:var(--primary);width:40px;height:40px;font-size:14px">${clientInitials(s.name)}</div>
        <div class="staff-head-main">
          <div class="staff-name">${escapeHtml(s.name)}</div>
          <div class="staff-role">${STAFF_ROLES[s.role] || s.role}${s.specialty ? ' · ' + escapeHtml(s.specialty) : ''}</div>
        </div>
        ${statusBadgeHtml}
      </div>
      <div class="staff-stats">
        <div class="stat"><div class="stat-value">${count}</div><div class="stat-label">записей</div></div>
        <div class="stat"><div class="stat-value">${Math.round(mins / 60 * 10) / 10}<span class="stat-unit"> ч</span></div><div class="stat-label">занято</div></div>
        <div class="stat"><div class="stat-value">${fmt.money(money)}</div><div class="stat-label">ожидается</div></div>
      </div>
      <div class="staff-chips" onclick="event.stopPropagation()">${chipsHtml}</div>
    </div>
  `;
}

function renderAnalytics() {
  const f = state.analyticsFilter || { period: '30' };
  const todayStr = today();
  let from = null;
  if (f.period === '7') from = addDays(todayStr, -6);
  else if (f.period === '30') from = addDays(todayStr, -29);
  else if (f.period === '90') from = addDays(todayStr, -89);
  // 'all' → from = null

  const inRange = (a) => from ? (a.date >= from && a.date <= todayStr) : true;
  const visits = state.appointments.filter(inRange);
  const completed = visits.filter(a => a.status === 'completed');
  const cancelled = visits.filter(a => a.status === 'cancelled');
  const noShow = visits.filter(a => a.status === 'no_show');
  const futurePending = visits.filter(a => ['pending', 'confirmed', 'arrived'].includes(a.status));

  let revenue = 0, due = 0, paid = 0, remainingDebt = 0, cashSum = 0, cardSum = 0;
  completed.forEach(a => { revenue += visitDue(a); paid += visitPaid(a); cashSum += visitPaidCash(a); cardSum += visitPaidCard(a); });
  visits.forEach(a => { if (a.status !== 'cancelled' && a.status !== 'no_show') { due += visitDue(a); remainingDebt += visitRemaining(a); } });
  const avgTicket = completed.length ? Math.round(revenue / completed.length) : 0;
  const noShowRate = visits.length ? Math.round((noShow.length / visits.length) * 100) : 0;
  const completionRate = visits.length ? Math.round((completed.length / visits.length) * 100) : 0;

  // Top services (by revenue across completed visits)
  const svcStats = {};
  completed.forEach(a => visitItems(a).forEach(i => {
    if (!svcStats[i.serviceId]) svcStats[i.serviceId] = { count: 0, revenue: 0 };
    svcStats[i.serviceId].count++;
    svcStats[i.serviceId].revenue += Number(i.price) || 0;
  }));
  const topServices = Object.entries(svcStats)
    .sort((a, b) => b[1].revenue - a[1].revenue)
    .slice(0, 5)
    .map(([sid, s]) => ({ name: getService(sid)?.name || '—', count: s.count, revenue: s.revenue }));

  // Top staff (by revenue, only performer roles)
  const staffStats = {};
  completed.forEach(a => visitItems(a).forEach(i => {
    if (!i.staffId) return;
    if (!staffStats[i.staffId]) staffStats[i.staffId] = { count: 0, revenue: 0 };
    staffStats[i.staffId].count++;
    staffStats[i.staffId].revenue += Number(i.price) || 0;
  }));
  const topStaff = Object.entries(staffStats)
    .sort((a, b) => b[1].revenue - a[1].revenue)
    .map(([sid, s]) => ({ name: getStaff(sid)?.name || '—', count: s.count, revenue: s.revenue }));

  // Top clients (by revenue)
  const clientStats = {};
  completed.forEach(a => {
    if (!clientStats[a.clientId]) clientStats[a.clientId] = { count: 0, revenue: 0 };
    clientStats[a.clientId].count++;
    clientStats[a.clientId].revenue += visitDue(a);
  });
  const topClients = Object.entries(clientStats)
    .sort((a, b) => b[1].revenue - a[1].revenue)
    .slice(0, 5)
    .map(([cid, s]) => ({ name: clientFullName(getClient(cid)) || '—', count: s.count, revenue: s.revenue }));

  // Room utilization (visits per room across all-not-cancelled)
  const roomStats = {};
  visits.filter(a => a.status !== 'cancelled' && a.status !== 'no_show').forEach(a => {
    const k = a.roomId || '__none';
    if (!roomStats[k]) roomStats[k] = 0;
    roomStats[k]++;
  });
  const totalRoomVisits = Object.values(roomStats).reduce((a, b) => a + b, 0) || 1;
  const roomList = (state.rooms || []).map(r => ({
    name: r.name, count: roomStats[r.id] || 0, share: Math.round(((roomStats[r.id] || 0) / totalRoomVisits) * 100),
  })).filter(r => r.count > 0).sort((a, b) => b.count - a.count);

  const periodLabels = { '7': 'За 7 дней', '30': 'За 30 дней', '90': 'За 90 дней', 'all': 'За всё время' };
  const renderBar = (label, val, max, money) => {
    const pct = max > 0 ? Math.max(2, Math.round((val / max) * 100)) : 0;
    return `
      <div class="ana-bar-row">
        <div class="ana-bar-label">${escapeHtml(label)}</div>
        <div class="ana-bar-track"><div class="ana-bar-fill" style="width:${pct}%"></div></div>
        <div class="ana-bar-value">${money ? fmt.money(val) : val}</div>
      </div>
    `;
  };
  const maxSvcRev = Math.max(1, ...topServices.map(s => s.revenue));
  const maxStaffRev = Math.max(1, ...topStaff.map(s => s.revenue));
  const maxClientRev = Math.max(1, ...topClients.map(s => s.revenue));
  const maxRoomCount = Math.max(1, ...roomList.map(r => r.count));

  return `
    <div class="ana-tabs">
      ${['7','30','90','all'].map(p => `<button class="settings-tab ${f.period === p ? 'active' : ''}" onclick="state.analyticsFilter.period='${p}';render()">${periodLabels[p]}</button>`).join('')}
    </div>

    <div class="ana-kpi">
      <div class="ana-kpi-card">
        <div class="ana-kpi-label">Выручка</div>
        <div class="ana-kpi-value">${fmt.money(revenue)}</div>
        <div class="ana-kpi-sub muted">${completed.length} завершённых визита</div>
      </div>
      <div class="ana-kpi-card">
        <div class="ana-kpi-label">Средний чек</div>
        <div class="ana-kpi-value">${fmt.money(avgTicket)}</div>
        <div class="ana-kpi-sub muted">по завершённым</div>
      </div>
      <div class="ana-kpi-card">
        <div class="ana-kpi-label">Завершено</div>
        <div class="ana-kpi-value">${completionRate}<span class="ana-kpi-unit">%</span></div>
        <div class="ana-kpi-sub muted">${completed.length} из ${visits.length}</div>
      </div>
      <div class="ana-kpi-card">
        <div class="ana-kpi-label">Не пришли</div>
        <div class="ana-kpi-value" style="color:${noShowRate > 10 ? 'var(--danger)' : 'var(--text)'}">${noShowRate}<span class="ana-kpi-unit">%</span></div>
        <div class="ana-kpi-sub muted">${noShow.length} визит(а)</div>
      </div>
      <div class="ana-kpi-card">
        <div class="ana-kpi-label">Долг</div>
        <div class="ana-kpi-value" style="color:${remainingDebt > 0 ? 'var(--danger)' : 'var(--success)'}">${fmt.money(remainingDebt)}</div>
        <div class="ana-kpi-sub muted">по активным визитам</div>
      </div>
      <div class="ana-kpi-card">
        <div class="ana-kpi-label">Касса</div>
        <div class="ana-kpi-value" style="font-size:14px;line-height:1.3">
          <div>Нал: <b>${fmt.money(cashSum)}</b></div>
          <div>Б/Р: <b>${fmt.money(cardSum)}</b></div>
        </div>
        <div class="ana-kpi-sub muted">по завершённым</div>
      </div>
    </div>

    <div class="ana-grid">
      <div class="ana-card">
        <div class="ana-card-title">Топ-услуги по выручке</div>
        ${topServices.length === 0 ? '<div class="muted ana-empty">Нет данных</div>' : topServices.map(s => renderBar(`${s.name} · ${s.count}×`, s.revenue, maxSvcRev, true)).join('')}
      </div>

      <div class="ana-card">
        <div class="ana-card-title">Исполнители</div>
        ${topStaff.length === 0 ? '<div class="muted ana-empty">Нет данных</div>' : topStaff.map(s => renderBar(`${s.name} · ${s.count} визит.`, s.revenue, maxStaffRev, true)).join('')}
      </div>

      <div class="ana-card">
        <div class="ana-card-title">Топ-клиенты</div>
        ${topClients.length === 0 ? '<div class="muted ana-empty">Нет данных</div>' : topClients.map(c => renderBar(`${c.name} · ${c.count}×`, c.revenue, maxClientRev, true)).join('')}
      </div>

      <div class="ana-card">
        <div class="ana-card-title">Загрузка кабинетов</div>
        ${roomList.length === 0 ? '<div class="muted ana-empty">Нет данных</div>' : roomList.map(r => renderBar(`${r.name} · ${r.share}%`, r.count, maxRoomCount, false)).join('')}
      </div>
    </div>
  `;
}

function renderRooms() {
  const f = state.roomsFilter;
  let list = [...(state.rooms || [])];
  if (f.search) {
    const q = f.search.toLowerCase();
    list = list.filter(r => (r.name || '').toLowerCase().includes(q));
  }
  list.sort((a, b) => a.name.localeCompare(b.name, 'ru'));
  return `
    <div class="appts-board">
      <div class="appts-board-head">
        <div class="filters">
          <div class="search-input">
            ${ICON.search}
            <input type="text" placeholder="Поиск по названию" value="${escapeHtml(f.search)}" oninput="state.roomsFilter.search=this.value;debouncedRender()">
          </div>
        </div>
      </div>
      <div class="appts-board-body">
        ${list.length === 0 ? `
          <div class="empty">
            <div class="empty-icon">${ICON.box}</div>
            <div class="empty-title">Кабинетов нет</div>
            <div class="empty-text">Создайте первый кабинет — кнопка справа сверху</div>
          </div>
        ` : `
          <div class="table-scroll">
            <table class="table">
              <thead>
                <tr><th>Название</th><th>Статус</th><th class="num">Записей</th><th></th></tr>
              </thead>
              <tbody>
                ${list.map(r => {
                  const used = state.appointments.filter(a => a.roomId === r.id).length;
                  return `
                    <tr style="cursor:pointer" onclick="openModal('room','${r.id}')">
                      <td>${escapeHtml(r.name)}</td>
                      <td>${r.active === false ? '<span class="badge badge-danger">Не активен</span>' : '<span class="badge badge-success">Активен</span>'}</td>
                      <td class="num muted">${used}</td>
                      <td onclick="event.stopPropagation()">
                        <div class="table-actions">
                          <button class="btn btn-ghost btn-sm btn-icon" onclick="openModal('room','${r.id}')" title="Редактировать">${ICON.edit}</button>
                        </div>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `}
      </div>
    </div>
  `;
}

function saveClinicInfo() {
  const name = (state.clinic?.name || '').trim();
  if (!name) { toast('Название клиники обязательно', 'error'); return; }
  if (!state.clinic.shortName) state.clinic.shortName = name;
  save();
  toast('Информация о клинике сохранена', 'success');
  document.title = state.clinic.name;
  render();
}
function onClinicLogoFile(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  if (file.size > 500 * 1024) { toast('Файл больше 500 KB, выберите поменьше', 'error'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    state.clinic.logo = e.target.result;
    save();
    toast('Логотип загружен', 'success');
    render();
  };
  reader.readAsDataURL(file);
}
function removeClinicLogo() {
  state.clinic.logo = '';
  save();
  toast('Логотип удалён', '');
  render();
}
function setSettingsTab(t) { state.settingsTab = t; render(); }

async function testGreenApi() {
  const el = document.getElementById('ga-status');
  if (el) el.textContent = 'Проверяю…';
  save();
  const r = await gaGetState();
  if (!r.ok) {
    if (el) { el.textContent = '✗ ' + r.error; el.style.color = 'var(--danger)'; }
    toast('Ошибка соединения: ' + r.error, 'error');
    return;
  }
  if (el) { el.textContent = '✓ ' + r.state; el.style.color = 'var(--success)'; }
  toast('Соединение есть. Состояние: ' + r.state, 'success');
}

function exportData() {
  const data = { clients: state.clients, services: state.services, products: state.products, appointments: state.appointments, staff: state.staff, rooms: state.rooms, clinic: state.clinic, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `clinic-backup-${today()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Резервная копия скачана', 'success');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.clients) state.clients = data.clients;
      if (data.services) state.services = data.services;
      if (data.products) state.products = data.products;
      if (data.appointments) state.appointments = data.appointments;
      save();
      toast('Данные загружены', 'success');
      render();
    } catch (err) { toast('Ошибка при загрузке файла', 'error'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function resetDemo() {
  if (!confirm('Сбросить все данные и загрузить демо? Это действие необратимо.')) return;
  seedData();
  state.bannerDismissed = false;
  toast('Демо-данные восстановлены', 'success');
  render();
}

function clearAll() {
  if (!confirm('Удалить ВСЕ данные? Это действие необратимо.')) return;
  state.clients = [];
  state.services = [];
  state.products = [];
  state.appointments = [];
  save();
  toast('Все данные удалены', 'success');
  render();
}

</script>
<script>
// ========== MODALS ==========
function openModal(type, id, prefill) {
  let data = prefill || {};
  if (id) {
    if (type === 'appointment') {
      const a = state.appointments.find(a => a.id === id);
      data = { ...a, items: visitItems(a).map(i => ({ ...i })) };
    }
    if (type === 'client') data = { ...state.clients.find(c => c.id === id) };
    if (type === 'service') data = { ...state.services.find(s => s.id === id) };
    if (type === 'product') data = { ...state.products.find(p => p.id === id) };
    if (type === 'staff') data = { ...state.staff.find(s => s.id === id) };
    if (type === 'room') data = { ...(state.rooms || []).find(r => r.id === id) };
  }
  if (type === 'appointment') {
    if (!Array.isArray(data.items)) data.items = [];
    if (!data.pickerStaffId) data.pickerStaffId = '';
    if (!data.lookup) data.lookup = { lastName: '', firstName: '', birthDate: '' };
    if (data.newClientDraft === undefined) data.newClientDraft = null;
  }
  state.modal = { type, data, editingId: id || null };
  render();
}

function closeModal() {
  state.modal = null;
  render();
}

function renderModal() {
  if (!state.modal) return '';
  const { type, data, editingId } = state.modal;
  let body = '', title = '';
  if (type === 'appointment') {
    title = editingId
      ? `Редактировать запись · ${fmt.dateShort(data.date)} в ${data.time}`
      : (data.date && data.time ? `Быстрая запись · ${fmt.dateShort(data.date)} в ${data.time}` : 'Новая запись');
    body = renderAppointmentForm(data);
  }
  else if (type === 'client') { title = editingId ? 'Редактировать клиента' : 'Новый клиент'; body = renderClientForm(data); }
  else if (type === 'service') { title = editingId ? 'Редактировать услугу' : 'Новая услуга'; body = renderServiceForm(data); }
  else if (type === 'product') { title = editingId ? 'Редактировать товар' : 'Новый товар'; body = renderProductForm(data); }
  else if (type === 'staff') { title = editingId ? 'Редактировать сотрудника' : 'Новый сотрудник'; body = renderStaffForm(data); }
  else if (type === 'room') { title = editingId ? 'Редактировать кабинет' : 'Новый кабинет'; body = renderRoomForm(data); }
  else if (type === 'appointmentDetail') return renderAppointmentDetailModal(data.id);
  else if (type === 'productDetail') return renderProductDetailModal(data.id);

  return `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${title}</div>
          <button class="modal-close" onclick="closeModal()">${ICON.x}</button>
        </div>
        <div class="modal-body">${body}</div>
        <div class="modal-footer">
          ${editingId && type !== 'appointmentDetail' ? `<button class="btn btn-danger" onclick="deleteFromModal('${type}','${editingId}')">${ICON.trash}<span>Удалить</span></button>` : ''}
          <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
          <button class="btn btn-primary" onclick="saveFromModal()">${ICON.check}<span>Сохранить</span></button>
        </div>
      </div>
    </div>
  `;
}

function renderAppointmentForm(d) {
  const eligibleStaff = state.staff.filter(s => s.active !== false && (s.role === 'cosmetologist' || s.role === 'permanent'));
  const pickerServices = d.pickerStaffId ? servicesForStaff(d.pickerStaffId) : [];
  const groupedPicker = {};
  pickerServices.forEach(s => {
    const k = getCatName(s.cat);
    if (!groupedPicker[k]) groupedPicker[k] = [];
    groupedPicker[k].push(s);
  });
  const total = (d.items || []).reduce((s, i) => s + (Number(i.price) || 0), 0);
  const c = d.clientId ? getClient(d.clientId) : null;
  const lk = d.lookup || { lastName: '', firstName: '', birthDate: '' };
  const draft = d.newClientDraft;
  return `
    <div class="form-section">Клиент</div>
    ${c ? `

      return `

function lookupClientForModal() {
  const d = state.modal?.data;
  if (!d) return;
  const ln = (d.lookup.lastName || '').trim();
  const fn = (d.lookup.firstName || '').trim();
  const bd = (d.lookup.birthDate || '').trim();
  if (!ln || !fn || !bd) { toast('Заполните Фамилия, Имя и Дату рождения', 'error'); return; }
  const found = findClientExact(ln, fn, bd);
  if (found) {
    d.clientId = found.id;
    d.newClientDraft = null;
    toast('Клиент найден: ' + clientFullName(found), 'success');
  } else {
    d.newClientDraft = { phone: '', email: '', tag: 'new' };
    toast('Клиент не найден — заполните карточку', '');
  }
  render();
}

function createClientFromModalDraft() {
  const d = state.modal?.data;
  if (!d || !d.newClientDraft) return;
  const draft = d.newClientDraft;
  const ln = (d.lookup.lastName || '').trim();
  const fn = (d.lookup.firstName || '').trim();
  const bd = (d.lookup.birthDate || '').trim();
  if (!draft.phone.trim()) { toast('Введите телефон', 'error'); return; }
  const c = {
    id: uid(),
    firstName: fn,
    lastName: ln,
    name: `${fn} ${ln}`.trim(),
    phone: draft.phone.trim(),
    email: (draft.email || '').trim(),
    birthDate: bd,
    tag: draft.tag || 'new',
    notes: '',
    createdAt: today(),
  };
  state.clients.push(c);
  d.clientId = c.id;
  d.newClientDraft = null;
  save();
  toast('Клиент создан', 'success');
  render();
}

function clearModalClient() {
  const d = state.modal?.data;
  if (!d) return;
  d.clientId = '';
  d.lookup = { lastName: '', firstName: '', birthDate: '' };
  d.newClientDraft = null;
  render();
}

function addModalItem(serviceId) {
  const d = state.modal?.data;
  if (!d) return;
  if (!d.pickerStaffId) { toast('Сначала выберите исполнителя', 'error'); return; }
  const s = getService(serviceId);
  if (!s) return;
  d.items = d.items || [];
  d.items.push({ id: uid(), serviceId: s.id, staffId: d.pickerStaffId, price: s.price, duration: s.duration });
  render();
}

function removeModalItem(itemId) {
  const d = state.modal?.data;
  if (!d) return;
  d.items = (d.items || []).filter(i => i.id !== itemId);
  render();
}

          ${a.notes ? `<div class="form-row"><label class="form-label">Заметки</label><div style="padding:10px;background:var(--bg-2);border-radius:var(--radius);font-size:13px;color:var(--text-2)">${escapeHtml(a.notes)}</div></div>` : ''}

            <label class="form-label">Изменить статус</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${Object.entries(STATUS).map(([k, v]) => `<button class="btn btn-sm ${a.status === k ? 'btn-primary' : 'btn-secondary'}" onclick="changeStatus('${a.id}','${k}')">${v.label}</button>`).join('')}
            </div>

        <div class="modal-footer">
          <button class="btn btn-danger" onclick="deleteAppointment('${a.id}')">${ICON.trash}<span>Удалить</span></button>

          <button class="btn btn-primary" onclick="closeModal();openModal('appointment','${a.id}')">${ICON.edit}<span>Редактировать</span></button>

}

function renderProductDetailModal(id) {
  const p = getProduct(id);
  if (!p) { closeModal(); return ''; }
  const status = p.stock === 0 ? { class: 'badge-danger', label: 'Нет в наличии' }
    : p.stock <= p.minStock ? { class: 'badge-warning', label: 'Заканчивается' }
    : { class: 'badge-success', label: 'В наличии' };
  return `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${escapeHtml(p.name)}</div>
          <button class="modal-close" onclick="closeModal()">${ICON.x}</button>
        </div>
        <div class="modal-body">
          <div style="margin-bottom:14px">
            <span class="badge">${PRODUCT_CATS[p.cat] || p.cat}</span>
            <span class="badge ${status.class}">${status.label}</span>
