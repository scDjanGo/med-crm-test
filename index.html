          <div class="detail-grid">
            <div class="detail-block">
              <div class="detail-block-label">На складе</div>
              <div class="detail-block-value">${p.stock} ${p.unit || ''}</div>
            </div>
            <div class="detail-block">
              <div class="detail-block-label">Минимум</div>
              <div class="detail-block-value">${p.minStock} ${p.unit || ''}</div>
            </div>
            <div class="detail-block">
              <div class="detail-block-label">Цена закупки</div>
              <div class="detail-block-value">${fmt.money(p.price)}</div>
            </div>
            <div class="detail-block">
              <div class="detail-block-label">Поставщик</div>
              <div class="detail-block-value">${escapeHtml(p.supplier || '—')}</div>
            </div>
          </div>
          <div class="form-row" style="margin-top:14px">
            <label class="form-label">Изменить остаток</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              <button class="btn btn-secondary btn-sm" onclick="adjustStock('${p.id}',-10)">−10</button>
              <button class="btn btn-secondary btn-sm" onclick="adjustStock('${p.id}',-1)">−1</button>
              <button class="btn btn-secondary btn-sm" onclick="adjustStock('${p.id}',1)">+1</button>
              <button class="btn btn-secondary btn-sm" onclick="adjustStock('${p.id}',5)">+5</button>
              <button class="btn btn-secondary btn-sm" onclick="adjustStock('${p.id}',10)">+10</button>
            </div>
          </div>
          ${p.description ? `<div class="form-row"><label class="form-label">Описание</label><div style="padding:10px;background:var(--bg-2);border-radius:var(--radius);font-size:13px;color:var(--text-2)">${escapeHtml(p.description)}</div></div>` : ''}
        </div>
        <div class="modal-footer">
          <button class="btn btn-danger" onclick="deleteProduct('${p.id}')">${ICON.trash}<span>Удалить</span></button>
          <button class="btn btn-secondary" onclick="closeModal()">Закрыть</button>
          <button class="btn btn-primary" onclick="closeModal();openModal('product','${p.id}')">${ICON.edit}<span>Редактировать</span></button>
        </div>
      </div>
    </div>
  `;
}

function adjustStock(id, delta) {
  const p = getProduct(id);
  if (!p) return;
  p.stock = Math.max(0, p.stock + delta);
  save();
  toast(`Остаток: ${p.stock} ${p.unit || ''}`, 'success');
  render();
}

// Shift-click for ±5, plain click for ±1
function adjustStockSmart(id, sign, event) {
  const step = (event && event.shiftKey) ? 5 : 1;
  adjustStock(id, sign * step);
}

function setStockPrompt(id) {
  const p = getProduct(id);
  if (!p) return;
  const v = prompt(`Установите остаток для «${p.name}»\nТекущий: ${p.stock} ${p.unit || ''}`, String(p.stock));
  if (v === null) return;
  const n = Number(v);
  if (!Number.isFinite(n) || n < 0) { toast('Введите неотрицательное число', 'error'); return; }
  p.stock = Math.floor(n);
  save();
  toast(`Остаток: ${p.stock} ${p.unit || ''}`, 'success');
  render();
}

function changeStatus(id, status) {
  const a = state.appointments.find(x => x.id === id);
  if (!a) return;
  a.status = status;
  save();
  toast('Статус обновлён', 'success');
  render();
}

function deleteAppointment(id) {
  if (!confirm('Удалить запись?')) return;
  state.appointments = state.appointments.filter(a => a.id !== id);
  save();
  closeModal();
  toast('Запись удалена', 'success');
}

function deleteProduct(id) {
  const p = getProduct(id);
  if (!p) return;
  if (!confirm(`Удалить товар «${p.name}»?`)) return;
  state.products = state.products.filter(x => x.id !== id);
  save();
  closeModal();
  toast('Товар удалён', 'success');
}

function deleteFromModal(type, id) {
  const m = state.modal;
  closeModal();
  if (type === 'appointment') deleteAppointment(id);
  else if (type === 'service') deleteService(id);
  else if (type === 'product') deleteProduct(id);
  else if (type === 'staff') {
    const s = getStaff(id);
    if (!s) return;
    if (!confirm(`Удалить сотрудника «${s.name}»?`)) { state.modal = m; render(); return; }
    state.staff = state.staff.filter(x => x.id !== id);
    // Detach from appointment items
    state.appointments.forEach(a => { (a.items || []).forEach(i => { if (i.staffId === id) i.staffId = null; }); });
    save();
    toast('Сотрудник удалён', 'success');
    render();
  }
  else if (type === 'room') {
    const r = getRoom(id);
    if (!r) return;
    if (!confirm(`Удалить кабинет «${r.name}»? Записи останутся, но потеряют ссылку.`)) { state.modal = m; render(); return; }
    state.rooms = state.rooms.filter(x => x.id !== id);
    state.appointments.forEach(a => { if (a.roomId === id) a.roomId = null; });
    save();
    toast('Кабинет удалён', 'success');
    render();
  }
  else if (type === 'client') {
    const c = getClient(id);
    if (!c) return;
    if (!confirm(`Удалить клиента «${c.name}» и все его записи?`)) { state.modal = m; render(); return; }
    state.clients = state.clients.filter(x => x.id !== id);
    state.appointments = state.appointments.filter(a => a.clientId !== id);
    save();
    state.activeClientId = null;
    toast('Клиент удалён', 'success');
    render();
  }
}

<script>
// ========== SAVE FROM MODAL ==========
function saveFromModal() {
  const m = state.modal;
  if (!m) return;
  const v = (id) => document.getElementById(id)?.value;
  const vNum = (id) => Number(document.getElementById(id)?.value || 0);

  if (m.type === 'appointment') {
    const d = m.data;
    const clientId = d.clientId;
    if (!clientId) { toast('Выберите клиента', 'error'); return; }
    if (!d.date || !d.time) { toast('Укажите дату и время', 'error'); return; }
    if (!d.items || !d.items.length) { toast('Добавьте хотя бы одну услугу', 'error'); return; }
    const paidCash = Math.max(0, Number(d.paidCash) || 0);
    const paidCard = Math.max(0, Number(d.paidCard) || 0);
    const obj = {
      clientId,
      date: d.date,
      time: d.time,
      roomId: d.roomId || null,
      items: d.items.map(i => ({ id: i.id || uid(), serviceId: i.serviceId, staffId: i.staffId || null, price: Number(i.price) || 0, duration: Number(i.duration) || 0 })),
      status: d.status || 'pending',
      discount: Math.max(0, Number(d.discount) || 0),
      paidCash,
      paidCard,
      prepayment: paidCash + paidCard,
      notes: d.notes || '',
    };
    if (m.editingId) {
      const a = state.appointments.find(x => x.id === m.editingId);
      // Replace the whole record but keep its id
      Object.assign(a, obj);
      toast('Запись обновлена', 'success');
    } else {
      state.appointments.push({ id: uid(), ...obj });
      toast('Запись создана', 'success');
    }
  }
  else if (m.type === 'client') {
    const name = v('m-name')?.trim();
    const phone = v('m-phone')?.trim();
    if (!name) { toast('Введите имя клиента', 'error'); return; }
    if (!phone) { toast('Введите телефон', 'error'); return; }
    const parts = name.split(/\s+/);
    const firstName = parts.length >= 2 ? parts.slice(0, -1).join(' ') : name;
    const lastName = parts.length >= 2 ? parts[parts.length - 1] : '';
    const obj = {
      name, firstName, lastName, phone,
      email: v('m-email') || '',
      birthDate: v('m-birthDate') || '',
      tag: v('m-tag') || 'new',
      notes: v('m-notes') || '',
    };
    if (m.editingId) {
      const c = getClient(m.editingId);
      Object.assign(c, obj);
      toast('Клиент обновлён', 'success');
    } else {
      state.clients.push({ id: uid(), createdAt: today(), ...obj });
      toast('Клиент добавлен', 'success');
    }
  }
  else if (m.type === 'service') {
    const name = v('m-name')?.trim();
    if (!name) { toast('Введите название услуги', 'error'); return; }
    const obj = {
      name,
      cat: v('m-cat') || 'other',
      duration: vNum('m-duration') || 45,
      price: vNum('m-price'),
      description: v('m-description') || '',
    };
    if (m.editingId) {
      const s = getService(m.editingId);
      Object.assign(s, obj);
      toast('Услуга обновлена', 'success');
    } else {
      state.services.push({ id: uid(), ...obj });
      toast('Услуга добавлена', 'success');
    }
  }
  else if (m.type === 'product') {
    const name = v('m-name')?.trim();
    if (!name) { toast('Введите название товара', 'error'); return; }
    const obj = {
      name,
      cat: v('m-cat') || 'other',
      supplier: v('m-supplier') || '',
      price: vNum('m-price'),
      unit: v('m-unit') || 'шт.',
      stock: vNum('m-stock'),
      minStock: vNum('m-minStock') || 1,
      description: v('m-description') || '',
    };
    if (m.editingId) {
      const p = getProduct(m.editingId);
      Object.assign(p, obj);
      toast('Товар обновлён', 'success');
    } else {
      state.products.push({ id: uid(), ...obj });
      toast('Товар добавлен', 'success');
    }
  }
  else if (m.type === 'staff') {
    const name = v('m-name')?.trim();
    if (!name) { toast('Введите ФИО сотрудника', 'error'); return; }
    const obj = {
      name,
      role: v('m-role') || 'cosmetologist',
      specialty: v('m-specialty') || '',
      phone: v('m-phone') || '',
      email: v('m-email') || '',
      schedule: v('m-schedule') || '',
      active: v('m-active') !== 'false',
    };
    if (m.editingId) {
      const s = getStaff(m.editingId);
      Object.assign(s, obj);
      toast('Сотрудник обновлён', 'success');
    } else {
      state.staff.push({ id: uid(), ...obj });
      toast('Сотрудник добавлен', 'success');
    }
  }
  else if (m.type === 'room') {
    const name = v('m-name')?.trim();
    if (!name) { toast('Введите название кабинета', 'error'); return; }
    const obj = { name, active: v('m-active') !== 'false' };
    if (m.editingId) {
      const r = getRoom(m.editingId);
      Object.assign(r, obj);
      toast('Кабинет обновлён', 'success');
    } else {
      state.rooms = state.rooms || [];
      state.rooms.push({ id: uid(), ...obj });
      toast('Кабинет добавлен', 'success');
    }
  }

  save();
  closeModal();
}

// ========== DEBOUNCE ==========
let _renderTimer;
function debouncedRender() {
  // Don't full re-render on every keystroke - just save the input value to state
  // and re-render after a short delay
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(() => render(true), 250);
}

// ========== RENDER ==========
function render(preserveFocus) {
  const root = $('#app');
  if (!root) return;
  // Save active element selector + selection for input restoration
  let focusInfo = null;
  if (preserveFocus) {
    const el = document.activeElement;
    if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA')) {
      const id = el.id;
      const start = el.selectionStart;
      const end = el.selectionEnd;
      if (id) focusInfo = { id, start, end };
    }
  }
  root.innerHTML = state.loggedIn ? renderApp() : renderLogin();
  if (focusInfo) {
    const el = document.getElementById(focusInfo.id);
    if (el) {
      el.focus();
      try { el.setSelectionRange(focusInfo.start, focusInfo.end); } catch (e) {}
    }
  }
  attachHandlers();
}

function attachHandlers() {
  const lf = $('#login-form');
  if (lf) {
    lf.onsubmit = (e) => {
      e.preventDefault();
      const u = $('#login-user').value;
      const p = $('#login-pass').value;
      if (u === 'admin' && p === 'demo') {
        state.loggedIn = true;
        save();
        render();
      } else {
        toast('Неверный логин или пароль. Используйте admin / demo', 'error');
      }
    };
  }
}

// ========== INIT ==========
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && state.modal) closeModal();
  else if (e.key === 'Escape' && state.sidebarOpen) toggleSidebar(false);
});

window.addEventListener('resize', () => {
  if (window.innerWidth > 768 && state.sidebarOpen) {
    state.sidebarOpen = false;
    render();
  }
});

(function init() {
  const loaded = load();
  if (!loaded || !state.services?.length) {
    seedData();
  } else if (!state.staff?.length) {
    // Migrate: previously-saved sessions had no staff array. Seed staff only.
    state.staff = [
      { id: uid(), name: 'Айгерим Султанова', role: 'cosmetologist', specialty: 'Инъекционная косметология, ботокс, филлеры', phone: '+996 555 100 200', email: 'sultanova@mail.kg', schedule: 'Пн–Сб, 09:00–18:00', active: true },
      { id: uid(), name: 'Назгуль Бекова', role: 'cosmetologist', specialty: 'Биоревитализация, мезотерапия, пилинги', phone: '+996 555 100 201', email: 'bekova@mail.kg', schedule: 'Пн–Пт, 10:00–19:00', active: true },
      { id: uid(), name: 'Чолпон Асанова', role: 'cosmetologist', specialty: 'Аппаратные процедуры, SMAS, RF', phone: '+996 555 100 202', email: '', schedule: 'Вт, Чт, Сб, 11:00–20:00', active: true },
      { id: uid(), name: 'Гулмира Тологонова', role: 'permanent', specialty: 'Перманентный макияж бровей, губ, межресничка', phone: '+996 555 100 203', email: 'tologonova@mail.kg', schedule: 'Пн, Ср, Пт, 10:00–18:00', active: true },
      { id: uid(), name: 'Бегимай Орозова', role: 'admin', specialty: 'Приём клиентов, ведение записей', phone: '+996 555 100 204', email: '', schedule: 'Пн–Вс, 09:00–20:00 (посменно)', active: true },
      { id: uid(), name: 'Жылдыз Касымова', role: 'cleaner', specialty: 'Уборка, дезинфекция кабинетов', phone: '+996 555 100 205', email: '', schedule: 'Ежедневно, 08:00–10:00 и 19:00–21:00', active: true },
    ];
    save();
  }
  // Migrate appointments: { serviceId, staffId, price, duration } → items[]; ensure prepayment field
  let migrated = false;
  state.appointments?.forEach(a => {
    if (!Array.isArray(a.items)) {
      a.items = a.serviceId ? [{
        id: uid(),
        serviceId: a.serviceId,
        staffId: a.staffId || null,
        price: Number(a.price) || 0,
        duration: Number(a.duration) || 0,
      }] : [];
      delete a.serviceId; delete a.staffId; delete a.price; delete a.duration;
      migrated = true;
    }
    if (typeof a.prepayment !== 'number') {
      a.prepayment = 0;
      migrated = true;
    }
    if (a.roomId === undefined) {
      a.roomId = null;
      migrated = true;
    }
    // Cash model: split prepayment into paidCash, default paidCard/discount to 0
    if (typeof a.paidCash !== 'number') {
      a.paidCash = Number(a.prepayment) || 0;
      migrated = true;
    }
    if (typeof a.paidCard !== 'number') {
      a.paidCard = 0;
      migrated = true;
    }
    if (typeof a.discount !== 'number') {
      a.discount = 0;
      migrated = true;
    }
    if (!a.notifications || typeof a.notifications !== 'object') {
      a.notifications = { dayBefore: null, dayOf: null, errors: [] };
      migrated = true;
    } else {
      if (a.notifications.dayBefore === undefined) { a.notifications.dayBefore = null; migrated = true; }
      if (a.notifications.dayOf === undefined) { a.notifications.dayOf = null; migrated = true; }
      if (!Array.isArray(a.notifications.errors)) { a.notifications.errors = []; migrated = true; }
    }
  });
  if (!state.greenApi) {
    state.greenApi = { idInstance: '', apiToken: '', enabled: false, autoSchedule: true };
    migrated = true;
  }
  // Service categories: seed from CATEGORIES constant (ids match existing service.cat values)
  if (!Array.isArray(state.serviceCategories) || state.serviceCategories.length === 0) {
    state.serviceCategories = Object.entries(CATEGORIES).map(([id, name]) => ({ id, name }));
    migrated = true;
  }
  if (!state.system) {
    state.system = {
      productName: 'PROlab Medical',
      version: '2.0',
      description: 'Медицинская CRM-система для клиник косметологии и эстетики.',
      supportPhone: '+996 555 000 000',
      supportWhatsapp: '+996 555 000 000',
      supportEmail: 'support@prolab-medical.kg',
      supportTelegram: '@prolab_support',
      supportWebsite: 'https://prolab-medical.kg',
      supportSchedule: 'Пн–Пт 09:00–18:00 (Bishkek)',
    };
    migrated = true;
  }
  if (!state.clinic) {
    state.clinic = {
      name: 'PROlab Medical',
      shortName: 'PROlab',
      logo: '',
      address: '',
      gis: '',
      phone: '',
      whatsapp: '',
      email: '',
      website: '',
      instagram: '',
      facebook: '',
      telegram: '',
      workHours: '',
    };
    migrated = true;
  } else {
    if ('logoLetter' in state.clinic && !('logo' in state.clinic)) {
      state.clinic.logo = '';
      delete state.clinic.logoLetter;
      migrated = true;
    }
    if (typeof state.clinic.gis !== 'string') {
      state.clinic.gis = '';
      migrated = true;
    }
  }
  // Migrate: ensure rooms array exists with sensible defaults.
  if (!Array.isArray(state.rooms) || state.rooms.length === 0) {
    state.rooms = [
      { id: uid(), name: 'Кабинет 1', active: true },
      { id: uid(), name: 'Кабинет 2', active: true },
      { id: uid(), name: 'Кабинет перманента', active: true },
    ];
    migrated = true;
  }
  // Migrate clients: derive lastName / firstName from `name` (seed format: "FirstName LastName")
  state.clients?.forEach(c => {
    if (!c.lastName && !c.firstName && c.name) {
      const parts = c.name.trim().split(/\s+/);
      if (parts.length >= 2) {
        c.firstName = parts.slice(0, -1).join(' ');
        c.lastName = parts[parts.length - 1];
      } else {
        c.firstName = c.name;
        c.lastName = '';
      }
      migrated = true;
    }
  });
  if (migrated) save();

  // Default page: avoid landing on removed dashboard
  if (state.currentPage === 'dashboard') state.currentPage = 'appointments';
  render();

  // Auto-tick: every 60s try to send the next pending notification
  setInterval(() => { try { notifyAutoTick(); } catch (e) { console.warn('notifyAutoTick failed', e); } }, 60 * 1000);
  // Also tick once on load (after a short delay so page settles)
  setTimeout(() => { try { notifyAutoTick(); } catch (e) {} }, 5000);
})();
</script>
